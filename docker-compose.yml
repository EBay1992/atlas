services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: atlas
      POSTGRES_PASSWORD: atlas
      POSTGRES_DB: atlas
    ports:
      - "5432:5432"
    volumes:
      - atlas_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atlas -d atlas"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: atlasminio
      MINIO_ROOT_PASSWORD: atlasminio
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - atlas_minio:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set atlas http://minio:9000 atlasminio atlasminio &&
      mc mb --ignore-existing atlas/atlas-documents &&
      exit 0
      "

  qdrant:
    image: qdrant/qdrant:v1.14.1
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - atlas_qdrant:/qdrant/storage
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "bash -c 'exec 3<>/dev/tcp/127.0.0.1/6333 && echo -e \"GET /readyz HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n\" >&3 && cat <&3 | grep -q \"HTTP/1.1 200\"'",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  # Standalone Aspire Dashboard for Compose-path OTel (no Aspire CLI required).
  # UI: http://localhost:18888  |  OTLP HTTP: localhost:4318  |  OTLP gRPC: localhost:4317
  aspire-dashboard:
    image: mcr.microsoft.com/dotnet/aspire-dashboard:9.5
    ports:
      - "18888:18888"
      - "4317:18889"
      - "4318:18890"
    environment:
      DOTNET_DASHBOARD_UNSECURED_ALLOW_ANONYMOUS: "true"
    profiles:
      - observability

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://atlas:atlas@postgres:5432/atlas?schema=public
      REDIS_HOST: redis
      S3_ENDPOINT: http://minio:9000
      QDRANT_URL: http://qdrant:6333
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      API_HOST: 0.0.0.0
      API_PORT: 3000
    ports:
      - "3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      qdrant:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://atlas:atlas@postgres:5432/atlas?schema=public
      REDIS_HOST: redis
      S3_ENDPOINT: http://minio:9000
      QDRANT_URL: http://qdrant:6333
      OLLAMA_BASE_URL: http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      qdrant:
        condition: service_healthy

volumes:
  atlas_pg:
  atlas_minio:
  atlas_qdrant:
